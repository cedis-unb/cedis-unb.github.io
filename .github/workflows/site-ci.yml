name: site-ci

# Executa a construção do site e validações leves em todo push para main
# e em todo pull request. Fase 1 do PLANO-AUDITORIA-2026 (issue I01).
#
# Não faz deploy. O deploy segue via docs/ versionado no commit até que
# essa etapa também seja movida para o CI (previsto em fase posterior).

on:
  push:
    branches: [main]
    # Ignora commits que apenas regeneram docs/ ou modificam docs de
    # metadados (evita jobs redundantes).
    paths-ignore:
      - 'docs/**'
      - '.tool-versions'
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancela execuções antigas de uma mesma branch se houver push novo.
concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  HUGO_VERSION: '0.164.0'
  NODE_VERSION: '24'
  HUGO_ENV: production

jobs:
  build:
    name: build + validate
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Necessário porque hugo.yaml tem enableGitInfo: true.
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Hugo Extended
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Install Node dependencies
        run: npm ci

      - name: Install Python validation dependencies
        run: python3 -m pip install --upgrade pyyaml jsonschema

      - name: Check generated publication pages
        run: python3 scripts/build_publications.py --check

      - name: Validate content data
        run: python3 scripts/validate_content.py
        env:
          CEDIS_VALIDATE_REPORT: content-validation-report.md

      - name: Validate PT/EN parity
        run: python3 scripts/validate_i18n.py
        env:
          CEDIS_I18N_REPORT: i18n-validation-report.md

      - name: Build site (Hugo)
        run: python3 scripts/build_publications.py && hugo --gc --minify --destination public

      - name: Build Pagefind index
        run: npx --no-install pagefind --site public

      - name: Start local audit server
        run: python3 -m http.server 4173 --directory public > /tmp/cedis-site-ci-http.log 2>&1 &

      - name: Wait for local audit server
        run: |
          for i in {1..30}; do
            curl -fsS http://127.0.0.1:4173/ >/dev/null && exit 0
            sleep 1
          done
          cat /tmp/cedis-site-ci-http.log || true
          exit 1

      - name: Accessibility audit (pa11y-ci)
        run: npx --no-install pa11y-ci --config .pa11yci.json --json > pa11y-report.json
        env:
          PUPPETEER_EXECUTABLE_PATH: /usr/bin/google-chrome

      - name: Lighthouse CI
        run: npx --no-install lhci autorun --config=lighthouserc.json

      - name: Install lychee (link checker)
        uses: lycheeverse/lychee-action@v2
        with:
          # --root-dir resolve links absolutos root-relative (href="/pt/foo")
          # contra o diretório local do build. Precisa ser caminho absoluto.
          args: >-
            --config lychee.toml
            --no-progress
            --root-dir ${{ github.workspace }}/public
            public/**/*.html
          fail: true
          # Salva relatório para inspeção mesmo em falha.
          output: lychee-report.md

      - name: Upload lychee report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lychee-report
          path: lychee-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload pa11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pa11y-report
          path: pa11y-report.json
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Lighthouse report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lhci-report
          path: lhci-report
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload content validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: content-validation-report
          path: content-validation-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload i18n validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: i18n-validation-report
          path: i18n-validation-report.md
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload built site
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: site-public
          path: public
          retention-days: 7
