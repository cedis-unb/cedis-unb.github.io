<div class="text-right">
    <button onclick="document.getElementById('{{ .Get "target" }}').scrollIntoView({ behavior: 'smooth' });" class="inline-flex items-center rounded-full border border-black/10 bg-white px-4 py-2 text-sm font-semibold text-gray-700 shadow-[0_10px_30px_rgba(15,23,42,0.08)] transition-colors hover:border-primary-500 hover:text-primary-600 focus:outline-none focus:ring-2 focus:ring-primary-500/30 dark:border-white/10 dark:bg-white/[0.04] dark:text-white/80 dark:hover:border-primary-300 dark:hover:text-primary-200">
      {{ if eq .Site.Language.Lang "pt" }}
        Voltar ao Topo
      {{ else }}
        Back to Top
      {{ end }}
    </button>
  </div>
