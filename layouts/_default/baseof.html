<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
    {{ partial "head.html" . }}
</head>

<body class="bg-zinc-100 dark:bg-gray-800">
    <a href="#main-content" class="sr-only focus:not-sr-only focus:fixed focus:top-4 focus:left-4 focus:z-[100] focus:rounded-lg focus:bg-primary-600 focus:px-4 focus:py-2 focus:text-sm focus:font-semibold focus:text-white focus:shadow-lg focus:outline-none focus:ring-2 focus:ring-white focus:ring-offset-2 focus:ring-offset-primary-600">{{ i18n "skip_to_content" }}</a>
    {{ partial "nav.html" . }}
    <div id="main-content" tabindex="-1" class="focus:outline-none">
        {{ block "main" . }}{{ end }}
    </div>
    {{ partial "footer" . }}
</body>

</html>
