{{ define "main" }}
<main class="bg-[radial-gradient(circle_at_top,_rgba(197,39,47,0.14),_transparent_26%),linear-gradient(180deg,_#f5f5f4_0%,_#ffffff_34%,_#f5f5f4_100%)] text-gray-950 dark:bg-gray-900 dark:text-gray-100">
  <div id="top"></div>

  <section class="border-b border-black/5 bg-transparent text-white">
    <div class="mx-auto max-w-screen-xl px-4 py-10 md:px-6 md:py-12 lg:px-8">
      <div class="flex justify-center text-center">
        <div class="w-full max-w-3xl rounded-[2rem] border border-white/10 bg-gray-950 px-5 py-7 shadow-[0_22px_70px_rgba(15,23,42,0.2)] md:px-8 md:py-8">
          <h1 class="text-4xl font-black tracking-tight text-white md:text-6xl">
            {{ .Title }}
          </h1>
        </div>
      </div>
    </div>
  </section>

  <section class="mx-auto max-w-screen-xl px-4 py-10 md:px-6 md:py-12 lg:px-8">
    <div class="not-prose">
      {{ .Content }}
    </div>
  </section>
</main>
{{ end }}
