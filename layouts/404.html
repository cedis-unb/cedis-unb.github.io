{{ define "main"}}
<script>
    // Recovery: if the URL contains stray quote/whitespace chars from bad copy-paste,
    // try again with a cleaned path. Handles cases like /quiz/"/pt/quiz/" → /quiz/
    (function () {
        try {
            var raw = location.pathname;
            if (/["'<>\s]|%22|%27/.test(raw)) {
                var cleaned = decodeURIComponent(raw).replace(/["'<>\s].*$/, '').replace(/\/+$/, '/');
                if (cleaned && cleaned !== raw && cleaned.length > 1) {
                    location.replace(cleaned);
                    return;
                }
            }
            // Also: /categoria/ → /categories/ common typo
            if (/^\/categoria\//.test(raw)) {
                location.replace(raw.replace('/categoria/', '/categories/'));
            }
        } catch (e) { /* ignore */ }
    })();
</script>
<main class="bg-zinc-100 dark:bg-gray-800">
    <div class="max-w-screen-xl px-4 py-8 mx-auto lg:py-16 lg:px-6">
        <div class="max-w-screen-sm mx-auto text-center">
            <h1 class="mb-4 font-black tracking-tight capitalize text-8xl lg:text-7xl xl:text-9xl text-gray-900 dark:text-white">
                404
            </h1>
            <p class="mb-4 text-3xl font-bold tracking-tight text-gray-900 md:text-4xl dark:text-white">
                {{ i18n "not_found_message" }}
            </p>
            <p class="mb-4 text-lg font-light text-gray-600 dark:text-white/72">
                {{ i18n "not_found_help" }}
            </p>
            <a href="{{ "/" | relLangURL }}"
                class="inline-flex text-white bg-primary-600 hover:bg-primary-800 focus:ring-4 focus:outline-none focus:ring-primary-300 font-medium rounded-lg text-sm px-5 py-2.5 text-center dark:focus:ring-primary-900 my-4">
                {{ i18n "back_to_home" }}
            </a>
        </div>
    </div>
</main>
{{ end }}
