env: production
languages:
  pt:
  # PORTUGUÊS
    label: "Português"
    locale: "pt-BR"
    title: CEDIS
    weight: 1
    params:
      data_lang: pt
      color: blue
      moto: "Bem vindo(a)!"  
      description: "Descubra o futuro da Engenharia de Software, da Aprendizagem e da Inteligência Artificial. \n Desde 2013, o Centro de Estudos, Desenvolvimento e Inovação em Software tem liderado projetos inovadores de pesquisa, desenvolvimento e educação."
      seemore: 
        text: "Conheça o CEDIS"
        link: /categories/knowledge_areas/
      authorimage: "../assets/images/global/sample-logo.svg"
      og_image: "/images/cedis-cover.png"
      disable_theme_toggle: false
      disable_stay_uptodate: true
      p1:
        heading: "O que fazemos"
        image: "images/pages/our-mission.png"
        content:
          - text: "Desde 2013 estudamos como o software é feito — e como as pessoas o fazem. Somos 7 pesquisadores, dezenas de orientandos e mais de uma década de projetos que atravessam engenharia de software, aprendizagem e inteligência artificial."
          - text: "Nosso trabalho vive em três frentes: pesquisa científica com produção contínua, desenvolvimento de produtos usados por parceiros reais, e formação de pessoas que carregam esse jeito de trabalhar para além da universidade."
      p3:
        heading: "Parcerias"
        content:
          - text: "Na execução das nossas pesquisas temos trabalhado em parceira com outras entidades, organizações e laboratórios de pesquisa."
        links:
          - text: "Conheça nossos parceiros"
            url: "/pt/parceiros/"
        logos:
          - identifier: "IBICT"
            image: "images/global/ibict.svg"
            alt: "IBICT"
          - identifier: A3M
            image: "images/global/A3M.png"
            alt: "A3M"
          - identifier: FAPDF
            image: "images/global/FAP-DF.svg"
            alt: "FAPDF"
          - identifier: CanalCiencia
            image: "images/global/cc.svg"
            alt: "CanalCiencia"
          - identifier: finatec
            image: "images/global/finatec.svg"
            alt: "finatec"
          - identifier: labvista
            image: "images/global/labvista.svg"
            alt: "LabVista"
      p4:
        heading: "Últimas notícias"
        content:
          - text: "Mantenha-se atualizado sobre todas as novidades do CEDIS!"
      social_media:
        github:
          enabled: enable
          url: "https://github.com/CedisUnB"
        Zenodo:
          enabled: enable
          url: "https://zenodo.org/communities/cedis-unb"
        Spotify:
          enabled: enable
          url: "https://open.spotify.com/show/4UH74yDMT5187cJCTVd09N?si=TVNyYu_DRPGuuv2XtWmgpA"
        facebook:
          enabled: false
        instagram:
          enabled: false
        twitter:
          enabled: false
        youtube:
          enabled: true
          url: "https://youtube.com/@CedisUnB"
        email:
          enabled: true
          url: "mailto:cedis@unb.br"
        linkedin:
          enabled: true
          url: "https://www.linkedin.com/company/cedis-unb"

