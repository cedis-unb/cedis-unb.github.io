  en:
  # ENGLISH
    #baseURL: '/en/'
    label: "English"
    title: CEDIS
    weight: 2
    params:
      color: blue
      moto: "Welcome!"
      description: "Discover the future of Software Engineering, Learning, and Artificial Intelligence. Since 2013, the Center for Studies, Development, and Innovation in Software has led innovative projects in research, development, and education."
      seemore: 
        text: "Explore CEDIS"
        link: /categories/knowledge_areas/
      authorimage: "../assets/images/global/sample-logo.svg"
      og_image: "/images/cedis-cover.png"
      disable_theme_toggle: false
      disable_stay_uptodate: true
      p1:
        heading: "What we do"
        image: "images/pages/our-mission.png"
        content:
          - text: "Since 2013 we've studied how software gets built — and who builds it. We are 7 researchers, dozens of students, and more than a decade of projects across software engineering, learning, and artificial intelligence."
          - text: "Our work runs on three fronts: scientific research with a steady output, product development used by real partners, and educating people who carry this way of working beyond the university."
      p3:
        heading: "Partnerships"
        content:
          - text: "In conducting our research, we have worked in partnership with other entities, organizations, and research laboratories."
        links:
          - text: "Meet our partners"
            url: "/partners/"
        logos:
          - identifier: "IBICT"
            image: "images/global/ibict.svg"
            alt: "IBICT"
          - identifier: A3M
            image: "images/global/A3M.png"
            alt: "A3M"
          - identifier: FAPDF
            image: "images/global/FAP-DF.svg"
            alt: "FAPDF"
          - identifier: CanalCiencia
            image: "images/global/cc.svg"
            alt: "CanalCiencia"
          - identifier: finatec
            image: "images/global/finatec.svg"
            alt: "finatec"
          - identifier: labvista
            image: "images/global/labvista.svg"
            alt: "LabVista"
      p4:
        heading: "Latest News"
        content:
          - text: "Stay updated on all the news from CEDIS!"
      social_media:
        github:
          enabled: enable
          url: "https://github.com/CedisUnB"
        Spotify:
          enabled: enable
          url: "https://open.spotify.com/show/4UH74yDMT5187cJCTVd09N?si=TVNyYu_DRPGuuv2XtWmgpA"
